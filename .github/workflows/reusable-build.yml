name: Reusable Python build validation

on:
  workflow_call:
    inputs:
      python-version:
        type: string
        default: "3.12"
      requirements-file:
        type: string
        default: "requirements/release.txt"

permissions:
  contents: read

jobs:
  build-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip
      - run: python -m pip install --require-hashes -r "${{ inputs.requirements-file }}"
      - run: python -m build
      - run: python -m twine check --strict dist/*
      - name: Inspect distributions
        run: python scripts/inspect_dist.py dist --output artifact-inventory.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: distributions-and-inventory
          path: |
            dist/*
            artifact-inventory.json
          if-no-files-found: error
      - name: Verify wheel-only installation
        shell: bash
        run: |
          wheel=(dist/*.whl)
          python -m venv .venv-wheel
          .venv-wheel/bin/python -m pip install --only-binary=:all: --no-deps "${wheel[0]}"
      - name: Verify sdist installation
        shell: bash
        run: |
          sdist=(dist/*.tar.gz)
          python -m venv .venv-sdist
          .venv-sdist/bin/python -m pip install --no-deps "${sdist[0]}"
