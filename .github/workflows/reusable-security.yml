name: Reusable Python security

on:
  workflow_call:
    inputs:
      python_version:
        type: string
        default: "3.12"
      requirements_file:
        type: string
        default: "requirements/test.txt"
      release_requirements_file:
        type: string
        default: "requirements/release.txt"

permissions:
  contents: read

jobs:
  dependency-audit:
    runs-on: ubuntu-latest
    env:
      RELEASE_REQUIREMENTS_FILE: ${{ inputs.release_requirements_file }}
      REQUIREMENTS_FILE: ${{ inputs.requirements_file }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ inputs.python_version }}
          cache: pip
      - name: Install hash-verified audit environment
        run: |
          python -m pip install --require-hashes -r "$REQUIREMENTS_FILE"
          python -m pip install --require-hashes -r "$RELEASE_REQUIREMENTS_FILE"
          python -m pip install --no-deps .
      - name: Validate dependency metadata
        run: python scripts/verify_dependencies.py --project .
      - name: Dependency consistency
        run: python -m pip check
      - name: Vulnerability audit
        run: python -m pip_audit --strict .
      - name: Locked-environment vulnerability audit
        run: python -m pip_audit --strict --require-hashes -r "$REQUIREMENTS_FILE"
      - name: Release-tool vulnerability audit
        run: python -m pip_audit --strict --require-hashes -r "$RELEASE_REQUIREMENTS_FILE"
      - name: Security regression tests
        run: python -m pytest
      - name: Generate CycloneDX SBOM
        run: python -m pip_audit --strict --format cyclonedx-json --output sbom.cdx.json .
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dependency-security-evidence
          path: sbom.cdx.json
          if-no-files-found: error

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
