name: Reusable Python security

on:
  workflow_call:
    inputs:
      python_version:
        type: string
        default: "3.12"
      requirements_file:
        type: string
        default: "requirements/test.txt"

permissions:
  contents: read

jobs:
  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ inputs.python_version }}
          cache: pip
      - name: Install hash-verified audit environment
        run: |
          python -m pip install --require-hashes -r "${{ inputs.requirements_file }}"
          python -m pip install --no-deps .
      - name: Validate dependency metadata
        run: python scripts/verify_dependencies.py --project .
      - name: Dependency consistency
        run: python -m pip check
      - name: Vulnerability audit
        run: python -m pip_audit --strict .
      - name: Locked-environment vulnerability audit
        run: python -m pip_audit --strict --require-hashes -r "${{ inputs.requirements_file }}"
      - name: Security regression tests
        run: python -m pytest
      - name: Generate CycloneDX SBOM
        run: python -m pip_audit --strict --format cyclonedx-json --output sbom.cdx.json .
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dependency-security-evidence
          path: sbom.cdx.json
          if-no-files-found: error

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: high
